name: Build Windows

# 触发方式：
#  ① 手动：仓库 Actions 页 → 选 "Build Windows" → Run workflow
#  ② 打 tag：推送形如 v0.1.0 的 tag 会自动构建，并把安装包传到对应 Release
on:
  workflow_dispatch:        # 手动触发
  push:
    branches: [ main ]      # 推送到 main 自动构建出包
    tags:
      - 'v*'                # 打 tag 额外发布到 Release

permissions:
  contents: write   # 打 tag 时创建 Release 需要

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust (stable, MSVC)
        uses: dtolnay/rust-toolchain@stable

      - name: Rust 构建缓存
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # 缓存内置运行时（Python/ffmpeg/Node），避免每次都重新下载约 100MB+
      - name: 缓存内置运行时
        uses: actions/cache@v4
        with:
          path: |
            src-tauri/python-runtime
            src-tauri/ffmpeg-runtime
            src-tauri/node-runtime
          key: runtimes-windows-${{ hashFiles('requirements.txt', 'src-tauri/scripts/prepare-*.ps1') }}

      - name: 安装前端依赖
        run: npm ci

      # 下载并准备内置 Python / ffmpeg / Node（beforeBuildCommand 不含这步，必须显式跑）
      - name: 准备内置运行时
        run: npm run prepare:all

      # ============================================================
      # Patch tauri.conf.json for current platform
      # ------------------------------------------------------------
      # 根因：tauri.conf.json 里 bundle.resources 写死的是 macos 路径
      #   "python-runtime/macos/python/**/*"
      #   "ffmpeg-runtime/macos/**/*"
      # 在 macOS runner 上能跑（macos 目录存在），但在 Windows runner 上
      # prepare 出来的是 windows/ 目录，macos 目录不存在，于是 tauri-bundler
      # 在做 NSIS/MSI bundle 的 copy_resources 阶段直接报错：
      #   glob pattern python-runtime/macos/python/**/* path not found
      #
      # build.rs 阶段的 TAURI_CONFIG env patch 只对 tauri-build 内部校验
      # 起作用，tauri-bundler 阶段（cargo build 之后）依然读 tauri.conf.json
      # 源文件，所以必须在 CI 里临时改 conf。改完备份，build 完恢复。
      # ============================================================
      - name: Patch tauri.conf.json for current platform
        run: |
          Copy-Item -Force src-tauri/tauri.conf.json src-tauri/tauri.conf.json.bak
          $conf = Get-Content src-tauri/tauri.conf.json -Raw
          $conf = $conf -replace 'python-runtime/macos/python', 'python-runtime/windows/python'
          $conf = $conf -replace 'ffmpeg-runtime/macos',        'ffmpeg-runtime/windows'
          Set-Content -Path src-tauri/tauri.conf.json -Value $conf -NoNewline
          Write-Host "Patched tauri.conf.json: macos -> windows in resources[]"

      # 触发 tauri build：beforeBuildCommand=npm run build（vue-tsc 类型检查 + vite 构建），
      # 随后 cargo 编译 + 生成 NSIS(.exe) / MSI(.msi) 安装包
      - name: 打包 Tauri（Windows）
        run: npm run tauri build
        id: tauri-build

      # 失败时上传完整日志到 artifact（默认 artifacts 在工作流被删后 90 天保留），
      # 便于本地/未登录用户也能拿到原始错误信息（GitHub 页面上的 logs 需登录才能看）
      - name: 上传失败日志（debug 用）
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-windows-failure-logs
          path: |
            src-tauri/target/release/build/autocast-*/output
            src-tauri/target/release/bundle/macos/bundle_dmg.sh.log
            src-tauri/target/release/bundle/nsis/*.log
            ${{ runner.temp }}/**/npm-*.log
          if-no-files-found: ignore
          retention-days: 30

      # 始终跑（无论成功失败）：恢复 tauri.conf.json 的 resources 字段，
      # 以防上一 step 失败中途把 runner 重启导致 conf 没被还原。
      # 见 "Patch tauri.conf.json for current platform" step 注释
      - name: 恢复 tauri.conf.json
        if: always()
        run: |
          if (Test-Path src-tauri/tauri.conf.json.bak) {
            Move-Item -Force src-tauri/tauri.conf.json.bak src-tauri/tauri.conf.json
            Write-Host "Restored tauri.conf.json from backup"
          }

      # 把安装包作为工作流产物上传（在该次 run 页面的 Artifacts 下载）
      - name: 上传安装包（Artifacts）
        uses: actions/upload-artifact@v4
        with:
          name: autocast-windows-installers
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

      # 仅当是 tag 触发：把安装包发布到 GitHub Release
      - name: 发布到 Release（仅 tag 触发）
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
