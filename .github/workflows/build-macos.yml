name: Build macOS

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Rust 构建缓存
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: 缓存内置运行时
        uses: actions/cache@v4
        with:
          path: |
            src-tauri/python-runtime
            src-tauri/ffmpeg-runtime
            src-tauri/node-runtime
          key: runtimes-macos-${{ hashFiles('requirements.txt', 'src-tauri/scripts/prepare-*.sh') }}

      - name: 缓存 AI 模型
        uses: actions/cache@v4
        with:
          path: src-tauri/resources/models
          key: ai-models-${{ hashFiles('scripts/download_model.py') }}

      - name: 安装前端依赖
        run: npm ci

      - name: 准备内置运行时
        run: npm run prepare:all

      - name: 下载 AI 模型
        run: |
          # 确保 python 运行时已准备好，以便运行下载脚本
          ./src-tauri/python-runtime/macos/python/bin/python3 scripts/download_model.py

      - name: 打包 Tauri (macOS)
        run: npm run tauri build

      - name: 上传安装包 (Artifacts)
        uses: actions/upload-artifact@v4
        with:
          name: autocast-macos-installers
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error

      - name: 发布到 Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/dmg/*.dmg
