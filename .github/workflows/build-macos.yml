name: Build macOS

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Rust 构建缓存
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: 缓存内置运行时
        uses: actions/cache@v4
        with:
          path: |
            src-tauri/python-runtime
            src-tauri/ffmpeg-runtime
            src-tauri/node-runtime
          key: runtimes-macos-${{ hashFiles('requirements.txt', 'src-tauri/scripts/prepare-*.sh') }}

      - name: 安装前端依赖
        run: npm ci

      - name: 准备内置运行时
        run: npm run prepare:all

      - name: 打包 Tauri (macOS)
        run: npm run tauri build

      - name: 清除 Quarantine 隔离属性 (防止提示损坏)
        run: |
          echo "Clearing quarantine flags for embedded runtimes..."
          # 针对构建目录中的应用包执行清除
          sudo xattr -dr com.apple.quarantine src-tauri/target/release/bundle/dmg/*.dmg || true
          # 虽然 DMG 是只读的，但我们可以尝试在打包后的 app 路径也清理一下
          find src-tauri/target/release/bundle/macos -name "*.app" -exec sudo xattr -rd com.apple.quarantine {} + || true

      - name: 上传安装包 (Artifacts)
        uses: actions/upload-artifact@v4
        with:
          name: autocast-macos-installers
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error

      - name: 发布到 Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/dmg/*.dmg
